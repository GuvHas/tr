name: Build ESP Firmware (ESP-IDF)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive' # Important if you use git submodules for dependencies

      # Use the official Espressif GitHub Action
      - name: Build with ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.3 # Specify your required ESP-IDF version
          target: esp32c6       # Specify your chip (esp32, esp32s3, esp32c3, etc.)
          path: '.'           # Path to your project directory

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp-idf-firmware
          path: |
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
            build/*.bin
